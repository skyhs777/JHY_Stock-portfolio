name: Update Portfolio Report

on:
  schedule:
    # UTC 기준. 0-7시(UTC) = 한국시간 9시~16시, 평일에 30분마다 실행
    # 필요하면 이 cron 표현식만 바꾸면 주기를 조정할 수 있습니다.
    - cron: '*/30 0-7 * * 1-5'
  workflow_dispatch: {}   # Actions 탭에서 수동으로도 실행 가능

permissions:
  contents: read
  pages: write
  id-token: write

defaults:
  run:
    working-directory: stock_alert

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: HTML 리포트 생성 (카카오톡은 보내지 않음, 별도 워크플로에서 처리)
        env:
          HOLDINGS_JSON: ${{ secrets.HOLDINGS_JSON }}
          CASH_JSON: ${{ secrets.CASH_JSON }}
        run: python main.py

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: 빌드 결과물(docs) 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: stock_alert/docs

      - name: GitHub Pages로 배포
        id: deployment
        uses: actions/deploy-pages@v4
